<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Authentication Page -->
    <div id="auth-page" class="startup-container" style="display: none;">
        <div class="auth-box">
            <h1 class="startup-name" style="margin-bottom: 20px;">Welcome to JARVIS</h1>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email" required class="auth-input">
                <input type="password" id="login-password" placeholder="Password" required class="auth-input">
                <button type="submit" class="start-btn auth-btn">Login</button>
                <button type="button" id="guest-login-btn" class="start-btn auth-btn" style="background-color: transparent; border: 1px solid var(--text-primary); color: var(--text-primary); margin-top: 10px;">Login as Guest</button>
                <div class="auth-links">
                    <a href="#" id="show-register">Create Account</a>
                    <a href="#" id="show-forgot-password">Forgot Password?</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" style="display: none;">
                <h2>Create Account</h2>
                <input type="email" id="register-email" placeholder="Email" required class="auth-input">
                <input type="password" id="register-password" placeholder="Password (min 6 chars)" required class="auth-input" minlength="6">
                <button type="submit" class="start-btn auth-btn">Register</button>
                <div class="auth-links">
                    <a href="#" id="show-login">Back to Login</a>
                </div>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgot-password-form" class="auth-form" style="display: none;">
                <h2>Reset Password</h2>
                <p style="font-size: 14px; margin-bottom: 15px;">Enter your email to receive a reset link.</p>
                <input type="email" id="forgot-email" placeholder="Email" required class="auth-input">
                <button type="submit" class="start-btn auth-btn">Send Reset Link</button>
                <div class="auth-links">
                    <a href="#" id="show-login-from-forgot">Back to Login</a>
                </div>
            </form>

            <!-- Reset Password Form (Shown via JS when token is present) -->
            <form id="reset-password-form" class="auth-form" style="display: none;">
                <h2>New Password</h2>
                <input type="password" id="reset-password" placeholder="New Password (min 6 chars)" required class="auth-input" minlength="6">
                <button type="submit" class="start-btn auth-btn">Update Password</button>
            </form>
            
            <div id="auth-message" style="margin-top: 15px; font-size: 14px; text-align: center;"></div>
        </div>
    </div>

    <!-- Startup Page -->
    <div id="startup-page" class="startup-container" style="display: none;">
        <div class="startup-content">
            <img src="baymax.png" alt="Baymax" class="startup-avatar">
            <h1 class="startup-name">Baymax</h1>
            <button id="start-chat-btn" class="start-btn">Start Chat</button>
        </div>
    </div>

    <div class="layout-wrapper" id="main-layout" style="display: none;">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <button id="new-chat-btn" class="new-chat-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
            <div class="chat-list-container">
                <ul id="chat-list" class="chat-list">
                    <!-- Chat items will be injected here -->
                </ul>
            </div>
        </nav>

        <div class="app-container" id="app-container">
            <!-- Header -->
            <header class="chat-header">
                <button id="toggle-sidebar-btn" class="icon-btn toggle-sidebar-btn" aria-label="Toggle Sidebar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <h1>AI Assistant</h1>
                <button id="logout-btn" class="icon-btn" aria-label="Logout" style="margin-left: auto;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </header>

        <!-- Chat Messages Container -->
        <main class="chat-container" id="chat-box">
            <div class="message bot-message">
                <div class="avatar"><img src="baymax.png" alt="Bot Avatar"></div>
                <div class="message-content">
                    Hello! How can I help you today?
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <button id="mic-button" class="icon-btn mic-btn" aria-label="Microphone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" x2="12" y1="19" y2="22"/>
                    </svg>
                </button>
                <input id="message-input" type="text" placeholder="Message AI Assistant..." class="message-input" autocomplete="off">
                <button id="send-button" class="icon-btn send-btn" aria-label="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" x2="11" y1="2" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="footer-text">
                AI can make mistakes. Consider verifying important information.
            </div>
        </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
